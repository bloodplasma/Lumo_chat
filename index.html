<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lumo Chat</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="page-shell">
      <div class="app-shell">
        <aside class="sidebar">
          <div class="brand">
            <div class="brand-mark" aria-hidden="true"></div>
            <span class="brand-text">Lumo</span>
          </div>

          <button class="new-chat-btn" id="newChatButton" type="button">
            <span class="plus-icon" aria-hidden="true">+</span>
            <span>새 대화</span>
          </button>

          <div class="sidebar-section">
            <p class="section-title">대화 기록</p>
            <div class="history-list" id="historyList">
              <button class="history-item" type="button">내일 날씨 어때?</button>
              <button class="history-item" type="button">인생의 의미가 뭘까?</button>
              <button class="history-item" type="button">추천 영화 알려줘</button>
              <button class="history-item" type="button">서울 맛집 추천</button>
              <button class="history-item" type="button">시간 관리 방법</button>
              <button class="history-item" type="button">친구에게 편지 쓰기</button>
              <button class="history-item active" type="button">새로운 대화</button>
            </div>
          </div>

          <div class="sidebar-footer">
            <div class="footer-menu">
              <button class="footer-item" type="button">
                <span class="menu-icon" aria-hidden="true">
                  <svg viewBox="0 0 24 24" fill="none">
                    <path
                      d="M20 15.2A8.8 8.8 0 1 1 8.8 4a7 7 0 0 0 11.2 11.2Z"
                      stroke="currentColor"
                      stroke-width="1.8"
                      stroke-linecap="round"
                      stroke-linejoin="round"
                    />
                  </svg>
                </span>
                <span>다크 모드</span>
              </button>
              <button class="footer-item" type="button">
                <span class="menu-icon" aria-hidden="true">
                  <svg viewBox="0 0 24 24" fill="none">
                    <path
                      d="M12 15.5a3.5 3.5 0 1 0 0-7 3.5 3.5 0 0 0 0 7Z"
                      stroke="currentColor"
                      stroke-width="1.8"
                    />
                    <path
                      d="M19.4 15a1 1 0 0 0 .2 1.1l.1.1a1.2 1.2 0 0 1 0 1.7l-1.6 1.6a1.2 1.2 0 0 1-1.7 0l-.1-.1a1 1 0 0 0-1.1-.2 1 1 0 0 0-.6.9V21a1.2 1.2 0 0 1-1.2 1.2h-2.3A1.2 1.2 0 0 1 9 21v-.2a1 1 0 0 0-.6-.9 1 1 0 0 0-1.1.2l-.1.1a1.2 1.2 0 0 1-1.7 0l-1.6-1.6a1.2 1.2 0 0 1 0-1.7l.1-.1a1 1 0 0 0 .2-1.1 1 1 0 0 0-.9-.6H3a1.2 1.2 0 0 1-1.2-1.2v-2.3A1.2 1.2 0 0 1 3 10.4h.2a1 1 0 0 0 .9-.6 1 1 0 0 0-.2-1.1l-.1-.1a1.2 1.2 0 0 1 0-1.7l1.6-1.6a1.2 1.2 0 0 1 1.7 0l.1.1a1 1 0 0 0 1.1.2 1 1 0 0 0 .6-.9V3A1.2 1.2 0 0 1 10.1 1.8h2.3A1.2 1.2 0 0 1 13.6 3v.2a1 1 0 0 0 .6.9 1 1 0 0 0 1.1-.2l.1-.1a1.2 1.2 0 0 1 1.7 0l1.6 1.6a1.2 1.2 0 0 1 0 1.7l-.1.1a1 1 0 0 0-.2 1.1 1 1 0 0 0 .9.6h.2A1.2 1.2 0 0 1 21 10.4v2.3a1.2 1.2 0 0 1-1.2 1.2H19a1 1 0 0 0-.9.6Z"
                      stroke="currentColor"
                      stroke-width="1.2"
                      stroke-linecap="round"
                      stroke-linejoin="round"
                    />
                  </svg>
                </span>
                <span>설정</span>
              </button>
              <button class="footer-item" type="button">
                <span class="menu-icon" aria-hidden="true">
                  <svg viewBox="0 0 24 24" fill="none">
                    <circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="1.8" />
                    <path
                      d="M9.8 9.4a2.4 2.4 0 1 1 3.8 2l-.8.6v1"
                      stroke="currentColor"
                      stroke-width="1.8"
                      stroke-linecap="round"
                      stroke-linejoin="round"
                    />
                    <circle cx="12" cy="17.2" r="1" fill="currentColor" />
                  </svg>
                </span>
                <span>도움말</span>
              </button>
            </div>

            <button class="guest-profile" type="button">
              <div class="guest-avatar" aria-hidden="true">
                <span class="guest-head"></span>
                <span class="guest-body"></span>
              </div>
              <span class="guest-name">Guest</span>
              <span class="chevron" aria-hidden="true">
                <svg viewBox="0 0 16 16" fill="none">
                  <path
                    d="M4 6.5 8 10.5l4-4"
                    stroke="currentColor"
                    stroke-width="1.7"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                  />
                </svg>
              </span>
            </button>
          </div>
        </aside>

        <main class="chat-panel">
          <div class="topbar">
            <div class="topbar-actions">
              <button class="icon-button" type="button" aria-label="알림">
                <svg viewBox="0 0 24 24" fill="none">
                  <path
                    d="M9.5 20a2.5 2.5 0 0 0 5 0M18 8.5a6 6 0 1 0-12 0c0 5-2 6.5-2 6.5h16s-2-1.5-2-6.5Z"
                    stroke="currentColor"
                    stroke-width="1.8"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                  />
                </svg>
              </button>
              <button class="icon-button" type="button" aria-label="프로필">
                <svg viewBox="0 0 24 24" fill="none">
                  <circle cx="12" cy="8" r="3.6" stroke="currentColor" stroke-width="1.8" />
                  <path
                    d="M5 19c1.6-3 4-4.5 7-4.5s5.4 1.5 7 4.5"
                    stroke="currentColor"
                    stroke-width="1.8"
                    stroke-linecap="round"
                  />
                  <circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="1.8" />
                </svg>
              </button>
            </div>
          </div>

          <div class="chat-scroll" id="chatScroll">
            <section class="hero">
              <h1>안녕하세요, 저는 <span>Lumo</span>예요.</h1>
              <p>무엇이든 물어보세요. 함께 생각해드릴게요.</p>
            </section>

            <section class="messages" id="messageList" aria-live="polite"></section>
          </div>

          <div class="composer-wrap">
            <form class="composer" id="chatForm">
              <textarea
                id="messageInput"
                rows="1"
                placeholder="메시지를 입력하세요..."
                aria-label="메시지 입력"
              ></textarea>

              <div class="composer-attachments" id="attachmentList" hidden></div>

              <div class="composer-toolbar">
                <div class="composer-tools">
                  <button
                    class="tool-button"
                    id="imageAttachButton"
                    type="button"
                    aria-label="이미지 첨부"
                  >
                    <svg viewBox="0 0 24 24" fill="none">
                      <rect x="3.5" y="4.5" width="17" height="15" rx="3" stroke="currentColor" stroke-width="1.7" />
                      <circle cx="9" cy="10" r="1.7" fill="currentColor" />
                      <path
                        d="m6.5 16.5 4.2-4.2a1.4 1.4 0 0 1 2 0l1.5 1.5a1.4 1.4 0 0 0 2 0l1.3-1.3a1.4 1.4 0 0 1 2 0l1 1"
                        stroke="currentColor"
                        stroke-width="1.7"
                        stroke-linecap="round"
                        stroke-linejoin="round"
                      />
                    </svg>
                  </button>
                  <button
                    class="tool-button"
                    id="fileAttachButton"
                    type="button"
                    aria-label="파일 첨부"
                  >
                    <svg viewBox="0 0 24 24" fill="none">
                      <path
                        d="m14.5 7-6.8 6.8a3.2 3.2 0 1 0 4.5 4.5L19 11.5a5 5 0 0 0-7-7l-7 7a6.8 6.8 0 1 0 9.6 9.6l6.3-6.3"
                        stroke="currentColor"
                        stroke-width="1.7"
                        stroke-linecap="round"
                        stroke-linejoin="round"
                      />
                    </svg>
                  </button>
                </div>

                <button class="send-button" id="sendButton" type="submit" aria-label="전송" disabled>
                  <svg viewBox="0 0 24 24" fill="none">
                    <path
                      d="M12 18V6m0 0-4.5 4.5M12 6l4.5 4.5"
                      stroke="currentColor"
                      stroke-width="2"
                      stroke-linecap="round"
                      stroke-linejoin="round"
                    />
                  </svg>
                </button>
              </div>

              <input id="imageInput" type="file" accept="image/*" multiple hidden />
              <input id="fileInput" type="file" multiple hidden />
            </form>
          </div>
        </main>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
